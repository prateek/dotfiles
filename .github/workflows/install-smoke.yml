name: install-smoke

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: |
          shellcheck -x \
            scripts/macos/capture.sh \
            scripts/vm/test-install-tart.sh \
            scripts/vm/check-install-log.sh \
            scripts/trace/perfetto-trace.bash

  nix-flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: nix flake check
        run: nix flake check --no-build

  macos-build:
    runs-on: macos-latest
    needs: nix-flake-check
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Zsh syntax check
        run: zsh -n scripts/trace/run-zsh

      - name: Python syntax check
        run: |
          python3 -m py_compile scripts/trace/xtrace-to-perfetto scripts/trace/merge-perfetto scripts/trace/open-perfetto
          python3 -m py_compile scripts/merge/json-deep-merge scripts/merge/toml-deep-merge scripts/merge/yojam-config-merge

      - name: Tart helper contract
        run: |
          make test-tart-install-helper
          make test-trace-perfetto
          make test-vm-install-log-scan
          make test-gemini-meeting-sync

      - name: darwin-rebuild build (no switch)
        run: |
          # Evaluate and build the system closure without applying it.
          # The build verifies modules type-check, file paths resolve,
          # and nix-darwin/home-manager wiring is consistent.
          nix --extra-experimental-features 'nix-command flakes' \
            build .#darwinConfigurations.prateek-mac.system \
            --no-link
