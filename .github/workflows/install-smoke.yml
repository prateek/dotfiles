name: install-smoke

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: |
          shellcheck -x install.sh scripts/macos/apply.sh scripts/macos/capture.sh scripts/vm/test-install-tart.sh scripts/vm/check-install-log.sh

  macos-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zsh syntax check
        run: zsh -n bootstrap.sh

      - name: Tart helper contract
        run: |
          make test-tart-install-helper
          make test-vm-install-log-scan
          make test-vm-postflight-macos

      - name: Bootstrap app list regression
        run: |
          ! grep -En '^(cask "airflow"|cask "omnigraffle"|mas "MeetInOne")' Brewfile

      - name: Install smoke (dry-run)
        run: |
          ./install.sh --core --dry-run
          ./install.sh --full --dry-run

      - name: Remote install smoke (dry-run)
        env:
          REPO_URL: ${{ github.workspace }}
          INSTALL_DIR: ${{ runner.temp }}/dotfiles-install
        run: |
          mkdir -p "${{ runner.temp }}/dotfiles-install-smoke"
          cd "${{ runner.temp }}/dotfiles-install-smoke"
          cat "${{ github.workspace }}/install.sh" | bash -s -- --core --dry-run

      - name: Brewfile parse
        run: |
          brew bundle list --all --file Brewfile.core >/dev/null
          brew bundle list --all --file Brewfile >/dev/null

      - name: Brew bundle (core formulae only)
        run: |
          set -euo pipefail
          HOMEBREW_BUNDLE_CASK_SKIP="$(awk -F'"' '/^cask "/ { print $2 }' Brewfile.core | xargs)"
          HOMEBREW_BUNDLE_MAS_SKIP="$(awk -F'"' '/^mas "/ { print $2 }' Brewfile.core | xargs)"
          export HOMEBREW_BUNDLE_CASK_SKIP
          export HOMEBREW_BUNDLE_MAS_SKIP
          brew bundle install --no-upgrade --file Brewfile.core
