name: install-smoke

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: |
          shellcheck -x install.sh scripts/macos/apply.sh scripts/macos/capture.sh scripts/vm/test-install-tart.sh scripts/vm/check-install-log.sh scripts/trace/perfetto-trace.bash

  macos-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: brew install chezmoi

      - name: Zsh syntax check
        run: |
          zsh -n scripts/trace/run-zsh

      - name: Python syntax check
        run: python3 -m py_compile scripts/trace/xtrace-to-perfetto scripts/trace/merge-perfetto scripts/trace/open-perfetto

      - name: Tart helper contract
        run: |
          make test-tart-install-helper
          make test-dotfiles-cli
          make test-gemini-meeting-sync
          make test-settings-coverage
          make test-pending-app-plists
          make test-zed-settings
          make test-moom-plist
          make test-trace-perfetto
          make test-vm-install-log-scan
          make test-vm-postflight-macos

      - name: Bootstrap app list regression
        run: |
          if bin/dotfiles render brewfile --profile full | grep -En '^(cask "airflow"|cask "omnigraffle"|mas ")'; then
            exit 1
          fi
          if bin/dotfiles render brewfile --profile full --include-mas | grep -En '^mas "MeetInOne"'; then
            exit 1
          fi

      - name: Install smoke (dry-run)
        run: |
          ./install.sh --core --dry-run
          ./install.sh --full --dry-run

      - name: Remote install smoke (dry-run)
        env:
          REPO_URL: ${{ github.workspace }}
          INSTALL_DIR: ${{ runner.temp }}/dotfiles-install
        run: |
          mkdir -p "${{ runner.temp }}/dotfiles-install-smoke"
          cd "${{ runner.temp }}/dotfiles-install-smoke"
          cat "${{ github.workspace }}/install.sh" | bash -s -- --core --dry-run

      - name: Brewfile parse
        run: |
          bin/dotfiles render brewfile --profile core --output "${RUNNER_TEMP}/Brewfile.core"
          bin/dotfiles render brewfile --profile full --output "${RUNNER_TEMP}/Brewfile"
          bin/dotfiles render brewfile --profile full --include-mas --output "${RUNNER_TEMP}/Brewfile.mas"
          brew bundle list --all --file "${RUNNER_TEMP}/Brewfile.core" >/dev/null
          brew bundle list --all --file "${RUNNER_TEMP}/Brewfile" >/dev/null
          brew bundle list --all --file "${RUNNER_TEMP}/Brewfile.mas" >/dev/null

      - name: Brew bundle (core formulae only)
        run: |
          set -euo pipefail
          core_brewfile="${RUNNER_TEMP}/Brewfile.core"
          bin/dotfiles render brewfile --profile core --output "$core_brewfile"
          HOMEBREW_BUNDLE_CASK_SKIP="$(awk -F'"' '/^cask "/ { print $2 }' "$core_brewfile" | xargs)"
          export HOMEBREW_BUNDLE_CASK_SKIP
          brew bundle install --no-upgrade --file "$core_brewfile"
