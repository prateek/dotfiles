name: install-smoke

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: |
          shellcheck -x scripts/macos/capture.sh scripts/vm/test-install-tart.sh scripts/vm/check-install-log.sh scripts/trace/perfetto-trace.bash scripts/chezmoi-hooks/guard-running-apps.sh scripts/chezmoi-hooks/post-apply-plists.sh scripts/packages/render-brewfile scripts/chezmoi/test-apply-dry-run.sh

  macos-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Install chezmoi
        run: brew install chezmoi

      - name: Zsh syntax check
        run: |
          zsh -n scripts/trace/run-zsh

      - name: Python syntax check
        run: python3 -m py_compile scripts/trace/xtrace-to-perfetto scripts/trace/merge-perfetto scripts/trace/open-perfetto

      - name: Docs lifecycle
        if: github.event_name == 'pull_request'
        run: DOCS_LIFECYCLE_BASE=origin/master make test-docs-lifecycle

      - name: Docs lifecycle
        if: github.event_name == 'push'
        run: |
          base="${{ github.event.before }}"
          if git rev-parse --verify "$base^{commit}" >/dev/null 2>&1; then
            DOCS_LIFECYCLE_BASE="$base" make test-docs-lifecycle
          else
            DOCS_LIFECYCLE_BASE=none make test-docs-lifecycle
          fi

      - name: Tart helper contract
        run: |
          make test-tart-install-helper
          make test-render-brewfile
          make test-chezmoi-config
          make test-chezmoi-script-status
          make test-chezmoi-drift-banner
          make test-codex-config
          make test-claude-settings
          make test-agent-skill-packages
          make test-gemini-meeting-sync
          make test-brew-install-wrapper
          make test-gh-extensions-script
          make test-selected-app-plists
          make test-zed-settings
          make test-zsh-prompt-host
          make test-moom-plist
          make test-plist-hooks
          make test-trace-perfetto
          make test-vm-install-log-scan
          make test-vm-postflight-macos

      - name: Bootstrap app list regression
        run: |
          if scripts/packages/render-brewfile --profile full | grep -En '^(cask "airflow"|cask "omnigraffle"|mas ")'; then
            exit 1
          fi
          if scripts/packages/render-brewfile --profile full --include-mas | grep -En '^mas "MeetInOne"'; then
            exit 1
          fi

      - name: Bootstrap smoke — chezmoi init + apply --dry-run, both profiles
        run: |
          set -euo pipefail
          for profile in core full; do
            ./scripts/chezmoi/test-apply-dry-run.sh "$profile" "${{ github.workspace }}"
          done

      - name: Brewfile parse
        run: |
          scripts/packages/render-brewfile --profile core --output "${RUNNER_TEMP}/Brewfile.core"
          scripts/packages/render-brewfile --profile full --output "${RUNNER_TEMP}/Brewfile"
          scripts/packages/render-brewfile --profile full --include-mas --output "${RUNNER_TEMP}/Brewfile.mas"
          brew bundle list --all --file "${RUNNER_TEMP}/Brewfile.core" >/dev/null
          brew bundle list --all --file "${RUNNER_TEMP}/Brewfile" >/dev/null
          brew bundle list --all --file "${RUNNER_TEMP}/Brewfile.mas" >/dev/null

      - name: Brew bundle (core formulae only)
        run: |
          set -euo pipefail
          core_brewfile="${RUNNER_TEMP}/Brewfile.core"
          scripts/packages/render-brewfile --profile core --output "$core_brewfile"
          HOMEBREW_BUNDLE_CASK_SKIP="$(awk -F'"' '/^cask "/ { print $2 }' "$core_brewfile" | xargs)"
          export HOMEBREW_BUNDLE_CASK_SKIP
          brew bundle install --no-upgrade --file "$core_brewfile"
