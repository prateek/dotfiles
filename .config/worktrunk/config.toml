# Worktrunk user config (dotfiles-managed)
#
# Location: ~/.config/worktrunk/config.toml (symlinked by bootstrap.sh)
#
# Notes:
# - User hooks do not require approval prompts.
# - Sparse hook is a no-op unless `WT_SPARSE_PATHS` is set by `w` (or the back-compat shims).
# - Add repo-specific hooks under `[projects."github.com/owner/repo".pre-start]` only when a repo truly needs extra setup.

skip-shell-integration-prompt = true

[commit.generation]
command = ""

[pre-start]
sparse = "wt-hook-sparse"
