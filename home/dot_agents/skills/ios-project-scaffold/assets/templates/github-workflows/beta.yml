name: Beta

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-testflight:
    runs-on: macos-15
    timeout-minutes: 45
    needs: [test]
    environment: beta
    if: ${{ !cancelled() && needs.test.result == 'success' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.3"

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install: true
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@7c0a9d9d7f7bde38f9f3a7fb8d4c7534d8da5d7d # v1.221.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Write ASC API key file
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          echo "$ASC_KEY_CONTENT" | base64 --decode > AuthKey_${ASC_KEY_ID}.p8

      - name: Deploy to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ github.workspace }}/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta
