[display]
title = "Trycycle Explorer"
subtitle = "Inspect gate prompts, bindings, and loop outcomes from the real trycycle repo."

[[groups]]
id = "session-setup"
label = "Session setup"
gates = [
  "version-check",
  "ask-about-critical-unknowns-before-work",
  "testing-strategy",
  "prepare-implementation-workspace",
  "workspace-hygiene-gate",
]

[[groups]]
id = "planning-loop"
label = "Planning loop"
gates = [
  "plan-with-trycycle-planning",
  "plan-editor-loop",
  "build-test-plan",
]

[[groups]]
id = "implementation-loop"
label = "Implementation loop"
gates = [
  "execute-with-trycycle-executing",
  "post-implementation-review-loop",
]

[[groups]]
id = "finish"
label = "Finish"
gates = ["finish"]

[bindings.INITIAL_REQUEST_AND_SUBSEQUENT_CONVERSATION]
label = "Conversation context JSON"
help = "Transcript JSON used for the testing-strategy prompt."
widget = "textarea"
source_category = "user-input"

[bindings.USER_REQUEST_TRANSCRIPT]
label = "Task input transcript JSON"
help = "Transcript JSON injected into planning prompts."
widget = "textarea"
source_category = "user-input"

[bindings.FULL_CONVERSATION_VERBATIM]
label = "Full conversation JSON"
help = "Transcript JSON used when building the test plan."
widget = "textarea"
source_category = "user-input"

[bindings.POST_IMPLEMENTATION_REVIEW_OBSERVATIONS_JSON]
label = "Post-implementation review observations JSON"
help = "Structured review observations fed back into the execution loop."
widget = "textarea"
source_category = "user-input"

[bindings.WORKTREE_PATH]
label = "Workspace path"
help = "Absolute path to the implementation workspace, either a dedicated worktree or an already-isolated current workspace."
widget = "text"
source_category = "derived-path"

[bindings.IMPLEMENTATION_PLAN_PATH]
label = "Implementation plan path"
help = "Absolute path to the current implementation plan file."
widget = "text"
source_category = "derived-path"

[bindings.TEST_PLAN_PATH]
label = "Test plan path"
help = "Absolute path to the current test plan file."
widget = "text"
source_category = "derived-path"

[provenance_palette.template-text]
label = "Template text"
fill = "#f7f1df"
ink = "#2c2416"
accent = "#8c6a2b"

[provenance_palette.user-input]
label = "User input"
fill = "#d7eef2"
ink = "#12333a"
accent = "#1f6d7a"

[provenance_palette.derived-path]
label = "Derived path"
fill = "#eadfc9"
ink = "#3c2d1b"
accent = "#9c6427"

[provenance_palette.sidecar-overlay]
label = "Sidecar overlay"
fill = "#f5d9d0"
ink = "#43211d"
accent = "#a4432a"

[provenance_palette.missing-binding]
label = "Missing binding"
fill = "#f4c7c3"
ink = "#4d1111"
accent = "#b42318"

[[sample_inputs]]
id = "simple-feature"
label = "Simple feature request"
path = "trycycle_explorer/samples/simple-feature.json"

[[sample_inputs]]
id = "plan-review-loop"
label = "Plan review loop"
path = "trycycle_explorer/samples/plan-review-loop.json"

[[sample_inputs]]
id = "post-review-fix"
label = "Post-review fix loop"
path = "trycycle_explorer/samples/post-review-fix.json"

[[sample_inputs]]
id = "no-worktree-conductor"
label = "No-worktree Conductor workspace"
path = "trycycle_explorer/samples/no-worktree-conductor.json"

