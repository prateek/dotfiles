[display]
title = "Trycycle Explorer"
subtitle = "Inspect gate prompts, bindings, reviewer/deepening loops, and outcomes from the real trycycle repo."

[[groups]]
id = "session-setup"
label = "Session setup"
gates = [
  "version-check",
  "ask-about-critical-unknowns-before-work",
  "testing-strategy",
  "prepare-implementation-workspace",
  "workspace-hygiene-gate",
]

[[groups]]
id = "planning-loop"
label = "Planning loop"
gates = [
  "plan-with-trycycle-planning",
  "planning-issue-review-and-synthesis-loop",
  "build-test-plan",
]

[[groups]]
id = "implementation-loop"
label = "Implementation loop"
gates = [
  "execute-with-trycycle-executing",
  "post-implementation-review-loop",
]

[[groups]]
id = "finish"
label = "Finish"
gates = ["finish"]

[bindings.INITIAL_REQUEST_AND_SUBSEQUENT_CONVERSATION]
label = "Conversation context JSON"
help = "Transcript JSON used for the testing-strategy prompt."
widget = "textarea"
source_category = "user-input"

[bindings.USER_REQUEST_TRANSCRIPT]
label = "Task input transcript JSON"
help = "Transcript JSON injected into planning prompts."
widget = "textarea"
source_category = "user-input"

[bindings.FULL_CONVERSATION_VERBATIM]
label = "Full conversation JSON"
help = "Transcript JSON used when building the test plan and reconsidering plans after review-loop blockers."
widget = "textarea"
source_category = "user-input"

[bindings.POST_IMPLEMENTATION_REVIEW_OBSERVATIONS_JSON]
label = "Post-implementation review observations JSON"
help = "Structured review observations fed back into the execution loop."
widget = "textarea"
source_category = "user-input"

[bindings.LATEST_IMPLEMENTATION_REPORT]
label = "Latest implementation report"
help = "Most recent implementation report supplied to the post-implementation reviewer as claims to verify."
widget = "textarea"
source_category = "user-input"

[bindings.REVIEW_ROUND_NUMBER]
label = "Review round number"
help = "The completed post-implementation review round that triggered plan reconsideration."
widget = "text"
source_category = "derived-path"

[bindings.REVIEW_LOOP_HISTORY]
label = "Review loop history"
help = "Accumulated raw review and fix-round evidence passed to plan reconsideration."
widget = "textarea"
source_category = "user-input"

[bindings.PLANNING_FINDINGS_MEMO]
label = "Planning findings memo"
help = "Accumulated issue/evidence memo from the planning issue finder and its same-agent deepening passes, passed to the fresh planning synthesizer."
widget = "textarea"
source_category = "derived-path"

[prompt_labels]
"subagents/prompt-planning-review.md" = "Planning issue finder"
"subagents/prompt-planning-review-deepen.md" = "Planning issue-finder deepening"
"subagents/prompt-planning-synthesis.md" = "Planning synthesis"
"subagents/prompt-post-impl-review.md" = "Fresh code reviewer"
"subagents/prompt-post-impl-review-deepen.md" = "Same-reviewer deepening"
"subagents/prompt-planning-reconsider.md" = "Post-review plan reconsideration"
"subagents/prompt-executing.md" = "Implementation or fix execution"
"subagents/prompt-nonconvergence-review.md" = "Nonconvergence review"

[gate_details."planning-issue-review-and-synthesis-loop"]
title = "Planning review cycle"

[[gate_details."planning-issue-review-and-synthesis-loop".items]]
label = "1. Fresh issue finder"
body = "A fresh planning subagent reviews the current implementation plan against the user's request and repo context. It reports ISSUES or READY and must not edit the plan."
prompt_source_path = "subagents/prompt-planning-review.md"

[[gate_details."planning-issue-review-and-synthesis-loop".items]]
label = "2. Same-agent deepening"
body = "If the issue finder reports ISSUES, the conductor keeps that same active subagent open and asks for additional critical plan issues. READY here means no additional issues in that deepening pass."
prompt_source_path = "subagents/prompt-planning-review-deepen.md"

[[gate_details."planning-issue-review-and-synthesis-loop".items]]
label = "3. Findings memo"
body = "The conductor accumulates the issue-review and deepening reports into a simple issue/evidence memo. The 5 ISSUES deepening cap stops discovery and continues to synthesis; it is not a halt."

[[gate_details."planning-issue-review-and-synthesis-loop".items]]
label = "4. Fresh synthesis"
body = "A fresh planning subagent receives the current plan plus the findings memo and rewrites the plan holistically. Synthesis is separate from issue discovery and does not run in the same subagent."
prompt_source_path = "subagents/prompt-planning-synthesis.md"

[[gate_details."planning-issue-review-and-synthesis-loop".items]]
label = "5. Fresh verification loop"
body = "After synthesis, the conductor starts another fresh issue-review round. READY proceeds to the test-plan phase. Five review rounds without READY goes to nonconvergence review."
prompt_source_path = "subagents/prompt-nonconvergence-review.md"

[gate_details."post-implementation-review-loop"]
title = "Post-implementation review cycle"

[[gate_details."post-implementation-review-loop".items]]
label = "1. Fresh code reviewer"
body = "A fresh reviewer gets the finalized implementation plan, finalized test plan, workspace, and latest implementation report. No blocking observations means the run can finish."
prompt_source_path = "subagents/prompt-post-impl-review.md"

[[gate_details."post-implementation-review-loop".items]]
label = "2. Same-reviewer deepening"
body = "If the reviewer reports critical or major issues, the conductor keeps that same reviewer open and asks for additional non-duplicate blocking observations before deciding the fix input."
prompt_source_path = "subagents/prompt-post-impl-review-deepen.md"

[[gate_details."post-implementation-review-loop".items]]
label = "3. Combined observations"
body = "Every normal and deepening response is saved, extracted, and combined into one review-round observations artifact. A 5th blocking deepening pass halts for user inspection instead of dispatching fixes."

[[gate_details."post-implementation-review-loop".items]]
label = "4. Plan reconsideration"
body = "When blockers remain at rounds 4, 6, 8, and the stop point, a fresh planning subagent decides whether implementation revealed a plan or test-plan gap."
prompt_source_path = "subagents/prompt-planning-reconsider.md"

[[gate_details."post-implementation-review-loop".items]]
label = "5. Fix execution or stop"
body = "If blockers remain before the stop point, the same persistent implementation subagent resumes with the combined critical/major observations. At the stop point, nonconvergence review runs instead."
prompt_source_path = "subagents/prompt-executing.md"

[bindings.WORKTREE_PATH]
label = "Workspace path"
help = "Absolute path to the implementation workspace, either a dedicated worktree or an already-isolated current workspace."
widget = "text"
source_category = "derived-path"

[bindings.IMPLEMENTATION_PLAN_PATH]
label = "Implementation plan path"
help = "Absolute path to the current implementation plan file."
widget = "text"
source_category = "derived-path"

[bindings.TEST_PLAN_PATH]
label = "Test plan path"
help = "Absolute path to the current test plan file."
widget = "text"
source_category = "derived-path"

