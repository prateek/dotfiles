# Obfuscated 1Password refs. Format: op://<vault-id>/<item-id>/<field-id>
# (use IDs not names; names leak metadata). Per-machine local config can
# override these with human-readable refs in
# ~/.config/chezmoi/chezmoi.toml.local for convenience.
#
# License-backed refs: each name corresponds to a private chezmoi template
# at the matching path in home/.chezmoidata/licenses.toml > paths.
# Empty value here means "not configured on this machine" — the per-app
# template renders empty (and .chezmoiignore skips the path until
# secrets_enabled=true is set on this machine).
[secrets.refs]
bettertouchtool_license = ""
moom_license = ""
alfred_license = ""
