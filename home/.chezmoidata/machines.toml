# Machine behavior, composed in layers by home/.chezmoitemplates/features.tmpl.
#
# The resolver merges the applicable layers, low precedence to high:
#   defaults < os.<os> < type.<machine_type> < host.<hostname>
#       < host-local [data].machines_local
# Later layers win. Scalars are last-writer-wins; a list (e.g. groups) is
# replaced wholesale by the highest layer that sets it (not concatenated).
# Keep feature values flat — scalars and lists, no nested tables — so the merge
# stays a simple last-writer-wins. See docs/adr/0012-config-gating-convention.md.
#
# [data] holds identity only (machine_type, paths, jamf_policy_id); all behavior
# lives here and resolves at apply time, so a change lands on the next
# `chezmoi apply` with no re-init. A new role is a [machines.type.*] layer; a
# richer attribute (OS, host, flavor) is a [machines.os.*] / [machines.host.*]
# layer — no new enum, no per-file `eq .machine_type` ladders.

[machines.defaults]
groups = ["core"]
run_install_scripts = true
apply_macos_defaults = true
secrets_enabled = false          # enable per machine via [data].machines_local
private_overlay = false
elevation = "none"

# Minimal/fast tier for CI dry-run, Tart smoke, and shell audits. Keeps the
# defaults' run_install_scripts/apply_macos_defaults = true so the Tart smoke
# lane (a real, minimal install) still runs the install scripts; non-installing
# contexts (the chezmoi-script-status test) opt out via [data].machines_local,
# and dry-runs never execute scripts regardless.
[machines.type.ci]
groups = ["core"]

# Personal daily-driver Mac.
[machines.type.personal]
groups = ["core", "mac-desktop", "ai-agent-apps", "developer-tools", "apple-development", "personal-apps"]

# Homelab Mac mini: development plus Apple tooling, remote/admin access, and
# AI agent apps (agentsview + Orca need each other to be useful), without the
# full interactive personal desktop surface.
[machines.type.homelab]
groups = ["core", "ai-agent-apps", "developer-tools", "apple-development", "homelab-overlay"]
# Non-secret Tartelet runner facts consumed by the managed dk.shape.Tartelet.plist
# fragment (verified key encodings from Tartelet source; see the runner plan). The
# secret half (org, App ID, private key, SSH login) is keychain-only and GUI-entered.
runner_vm_name = "tartelet-runner"
runner_vm_count = 1
runner_labels = "tartelet,homelab"
runner_scope = "repo"                  # GitHubRunnerScope rawValue: "organization" | "repo"; repo = one runner per repo
runner_start_on_launch = true

# Managed work Mac: no personal apps, no Apple/iOS toolchain; Jamf elevation and
# the private config overlay.
[machines.type.work]
groups = ["core", "mac-desktop", "ai-agent-apps", "developer-tools", "work-apps"]
private_overlay = true
elevation = "jamf-self-service"

# os.<os> and host.<hostname> layers are intentionally absent until needed.
# The resolver digs them with an empty-dict default, so a missing layer is a
# no-op. Add e.g. [machines.os.windows] or [machines.host.gaming-rig] when a
# Linux homelab flavor or a Windows box needs to compose extra behavior.

# Homelab mini with a dedicated external SSD for Tart. tart_home points TART_HOME
# at the volume so VM images and disks never fill the boot drive. It is honored
# only when the SSD is actually mounted; see home/dot_zshenv.tmpl (shell startup)
# and scripts/vm/lib.sh (the multi-GB lane guard). Absent on other hosts, so tart
# falls back to its ~/.tart default there.
[machines.host.m4mini]
tart_home = "/Volumes/TartVMs/tart"
