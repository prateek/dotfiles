# Reusable package groups. Each machine type selects a set of these groups via
# home/.chezmoidata/machines.toml (resolved by features.tmpl); the brewfile and
# the package-cask-enabled gate union each group's sections, deduped by name.
# See docs/adr/0010-machine-type-package-selection.md.

# === Reusable groups ===

# Applies to: ci, personal, homelab, work.
[packages.groups.core]
description = "Headless-safe baseline for every managed machine, including ci"
taps = [
  { name = "1password/tap" },
]
brews = [
  { name = "git" },
  { name = "gh" },
  { name = "gitleaks" },
  { name = "direnv" },
  { name = "mise" },
  { name = "fd" },
  { name = "fzf" },
  { name = "ripgrep" },
  { name = "zoxide" },
  { name = "neovim" },
  { name = "tmux" },
  { name = "shellcheck" },
  { name = "uv" },
]
casks = [
  { name = "1password-cli" },
]
gh_extensions = [
  { name = "enthus-appdev/gh-attach" },
]

# Applies to: personal, work.
[packages.groups.mac-desktop]
description = "Shared GUI apps and Mac control tools for daily-driver laptops"
taps = [
  { name = "yqrashawn/goku" },
  { name = "nikitabobko/tap" },
  { name = "fluffypony/yojam" },
  { name = "manaflow-ai/cmux" },
  { name = "stablyai/orca" },
]
brews = [
  # Keyboard and display control.
  { name = "kanata" },
  { name = "yqrashawn/goku/goku" },
  { name = "brightness" },
  { name = "ddcctl" },

  # Desktop app install support and editor integration.
  { name = "mas" },
  { name = "codex-acp" },
]
casks = [
  # Accounts, browsers, terminals, and editors.
  { name = "1password", appdir = "/Applications" },
  { name = "google-chrome" },
  { name = "google-drive" },
  { name = "ghostty" },
  { name = "visual-studio-code" },
  { name = "zed" },

  # Fonts.
  { name = "font-inter" },
  { name = "font-hack-nerd-font" },
  { name = "font-jetbrains-mono" },
  { name = "font-jetbrains-mono-nerd-font" },
  { name = "font-meslo-for-powerline" },

  # AI and agent apps.
  { name = "codex" },
  { name = "claude" },
  { name = "agentsview" },
  { name = "cmux" },
  { name = "stablyai/orca/orca" },

  # Input, window, launcher, and browser-routing tools.
  { name = "bettertouchtool" },
  { name = "karabiner-elements" },
  { name = "nikitabobko/tap/aerospace" },
  { name = "leader-key" },
  { name = "moom", appdir = "/Applications" },
  { name = "hammerspoon", appdir = "/Applications" },
  { name = "raycast" },
  { name = "yojam" },

  # Display, menu bar, diagnostics, and local virtualization.
  { name = "betterdisplay" },
  { name = "caffeine", appdir = "/Applications" },
  { name = "jordanbaird-ice" },
  { name = "key-codes", appdir = "/Applications" },
  { name = "launchcontrol", appdir = "/Applications" },
  { name = "orbstack" },
]
mas = [
  { name = "Okta Verify", id = 490179405 },
]

