[packages.groups.dev-apple]
description = "Xcode / iOS toolchain; presence gates the Xcode setup step. xcode_required_brews install after Xcode setup, not via the Brewfile."
taps = [
  { name = "facebook/fb" },
  { name = "peripheryapp/periphery" },
]
brews = [
  { name = "fastlane" },
  { name = "swiftformat" },
  { name = "xcbeautify" },
  { name = "homebrew/core/xcodes", args = ["force-bottle"] },
  { name = "xcodegen" },
]
casks = [
  { name = "peripheryapp/periphery/periphery" },
  { name = "tuist" },
]
xcode_required_brews = [
  { name = "facebook/fb/idb-companion" },
  { name = "swiftlint" },
]

[packages.groups.personal-apps]
description = "Personal apps for personal/homelab machines; never installed on work"
casks = [
  { name = "arq", appdir = "/Applications" },
  { name = "voiceink" },
  { name = "tailscale-app" },
]

# === Machine types compose groups ===

[packages.machine_types.ci]
description = "Minimal/fast tier for CI dry-run, Tart smoke, and shell audits"
groups = ["base"]

[packages.machine_types.personal]
description = "Personal daily-driver Mac"
groups = ["base", "dev", "dev-apple", "personal-apps"]

[packages.machine_types.homelab]
description = "Homelab Mac"
groups = ["base", "dev", "dev-apple", "personal-apps"]

[packages.machine_types.work]
description = "Managed work Mac (no personal apps)"
groups = ["base", "dev", "dev-apple"]
