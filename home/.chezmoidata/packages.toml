# Package selection is driven by a single axis: machine_type.
# A machine type composes reusable groups; the brewfile and the
# package-cask-enabled gate union each group section deduped by name.
# See docs/adr/0010-machine-type-package-selection.md.

[packages]
default_machine_type = "personal"

# === Reusable groups ===

[packages.groups.base]
description = "Essentials installed on every machine, including the ci type"
taps = [
  { name = "1password/tap" },
  { name = "felixkratz/formulae" },
  { name = "fluffypony/yojam" },
  { name = "yqrashawn/goku" },
]
brews = [
  { name = "direnv" },
  { name = "fd" },
  { name = "felixkratz/formulae/borders" },
  { name = "fzf" },
  { name = "zoxide" },
  { name = "gh" },
  { name = "git" },
  { name = "gitleaks" },
  { name = "git-spice" },
  { name = "kanata" },
  { name = "libpq" },
  { name = "llm" },
  { name = "mise" },
  { name = "neovim" },
  { name = "ripgrep" },
  { name = "uv" },
  { name = "shellcheck" },
  { name = "tmux" },
  { name = "worktrunk" },  # worktrunk ships the `wt` binary; conflicts with `wiredtiger` if ever installed.
  { name = "yqrashawn/goku/goku" },  # goku: compiles ~/.config/karabiner.edn → karabiner.json
]
casks = [
  { name = "codex" },
  { name = "1password", appdir = "/Applications" },
  { name = "1password-cli" },
  { name = "alfred", appdir = "/Applications" },
  { name = "bettertouchtool" },
  { name = "font-hack-nerd-font" },
  { name = "font-jetbrains-mono" },
  { name = "ghostty" },
  { name = "iterm2" },
  { name = "google-chrome" },
  { name = "jump-desktop" },
  { name = "jump-desktop-connect" },
  { name = "karabiner-elements" },
  { name = "leader-key" },
  { name = "moom", appdir = "/Applications" },
  { name = "orbstack" },
  { name = "raycast" },
  { name = "setapp" },
  { name = "visual-studio-code" },
  { name = "yojam" },
]
gh_extensions = [
  { name = "enthus-appdev/gh-attach" },
]
disabled_casks = [
  { name = "cleanshot", reason = "Optional: CleanShot X (often licensed/installed via Setapp)" },
]

