# Mise loads `~/.config/mise/conf.d/*.toml` alphabetically after this file.
# All current tool/env/settings entries live under conf.d/:
#
#   conf.d/runtimes.toml  - language runtimes (node, go, ruby) + ecosystem
#                           package managers (yarn, pnpm) + per-language settings
#   conf.d/clis.toml      - standalone CLIs grouped by purpose (dev-deps, AI
#                           harnesses, agent skill backends), with any
#                           tool-tied [env] in the same file
#   conf.d/<name>.toml    - promote a category here once it has ~3+ stable
#                           entries that share env / settings / hooks
#   conf.d/zz-local.toml  - host-local channel selections written by
#                           `mise run crit:use` / `codex:use`; unmanaged,
#                           sorts last so it overrides clis.toml pins
#
# Keep this file empty unless something truly belongs at the root layer
# (e.g., a setting that must load before every conf.d file). See
# `~/dotfiles/docs/adr/0005-mise-tool-management.md`.
