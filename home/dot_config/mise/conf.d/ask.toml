# `ask` (https://github.com/pleaseai/ask): version-accurate library docs/source
# for coding agents. The tool entry and its env live together so this whole
# concern can be reasoned about (or removed) in one place. See the `ask`
# skill under `~/.agents/skills/ask/` for usage.

[tools]
"npm:@pleaseai/ask" = "latest"

[env]
# Cache lives under XDG_CACHE_HOME so it stays out of $HOME root.
ASK_HOME = "{{ get_env(name='XDG_CACHE_HOME', default='~/.cache') }}/ask"
