name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15      # or macos-26 — both ship Xcode 26.3 + iOS 26.2 runtime
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'   # keep in sync with .xcode-version

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Sanity check toolchain
        run: |
          xcodebuild -version
          tuist version
          xcrun simctl list runtimes
          xcbeautify --version

      - name: Create CI simulator
        run: |
          xcrun simctl create "CI-iPhone-17-Pro" \
            "com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro" \
            "com.apple.CoreSimulator.SimRuntime.iOS-26-2"
          UDID=$(xcrun simctl list devices -j \
            | jq -r '.devices | to_entries[] | .value[]
                     | select(.name=="CI-iPhone-17-Pro") | .udid' | head -1)
          echo "$UDID" > .ios-sim-udid
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Generate project
        run: make generate

      - name: Unit tests
        run: make test-unit

      - name: UI tests
        run: make test-ui

      - name: Archive xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresults
          path: /tmp/${{ github.event.repository.name }}-*/Logs/Test/*.xcresult
          if-no-files-found: ignore
