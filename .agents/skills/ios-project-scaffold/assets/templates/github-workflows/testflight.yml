name: TestFlight

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight release

jobs:
  beta:
    runs-on: macos-15
    timeout-minutes: 30
    environment: testflight     # require a reviewer gate; configure in repo Settings → Environments

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '26.3'

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install: true
          cache: true

      - name: Install Fastlane via gem
        run: gem install fastlane -N

      - name: Fastlane beta (build + upload to TestFlight)
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID:    ${{ secrets.ASC_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          # Store the raw .p8 file contents (base64-decoded) as a repo secret
          # named ASC_API_KEY_KEY. Fastlane reads this variable and materializes
          # the key in-memory, which is simpler than writing the .p8 to disk.
          APP_STORE_CONNECT_API_KEY_KEY:       ${{ secrets.ASC_API_KEY_KEY }}
          CHANGELOG: ${{ github.event.head_commit.message }}
        run: fastlane beta
