# Pin every tool the project depends on through mise so CI and local dev
# run the same versions. Override any of these per-project by editing values.

[tools]
# Swift toolchain (Xcode itself is pinned via .xcode-version so xcodes can
# switch it; this pin tells mise to ensure Tuist and Ruby are present).
tuist = "4.61.2"
ruby  = "3.3.5"          # for Fastlane

# Swift CLI tooling (distributed as GitHub releases; ubi pulls and caches).
"ubi:cpisciotta/xcbeautify" = "2.16.0"
"ubi:realm/SwiftLint"       = "0.57.1"

# Runtime utilities the Makefile uses.
jq = "1.7.1"

[env]
# Never let Tuist steal Xcode focus.
TUIST_GENERATE_OPEN = "0"
