# ABOUTME: Workflow definitions for the Movies.do iOS streaming app.
# ABOUTME: Covers all 10 core user flows from sign-in through playback and library management.
#
# Calibration notes (2026-04-10):
#   - Tab bar is NOT surfaced in idb's accessibility tree, so tab navigation
#     uses coordinate taps against iPhone 16 Pro (402x874 pts):
#       Home=(40,818) Browse=(120,818) Search=(201,818) Downloads=(282,818) Library=(362,818)
#   - heroCard identifier is triplicated by SwiftUI propagation:
#     id=`heroCard-heroCard-heroCard`
#   - posterCard_N ids are duplicated across rails — use text selectors for posters
#   - Each non-SignIn flow begins with `terminate + launch` so it starts on Home
#     (auth persists via Keychain, so relaunch skips the sign-in screen)

app:
  bundle_id: com.movies.do.ios
  name: Movies.do
  credentials:
    # Replace with your test account. Never commit real credentials.
    # Prefer loading from environment variables at runtime.
    username: "${MOVIES_DO_TEST_USERNAME}"
    password: "${MOVIES_DO_TEST_PASSWORD}"

workflows:
  - name: Sign In
    description: User signs in with credentials and lands on home screen
    tags: [critical, auth]
    steps:
      - action: launch
        description: Launch the app (assumes signed-out state)

      - action: wait
        duration: 3
        description: Wait for sign-in screen

      - action: screenshot
        name: signin_screen
        description: Sign-in screen

      - action: tap
        target: { id: usernameField }
        description: Focus username field

      - action: type
        value: "${MOVIES_DO_TEST_USERNAME}"
        description: Enter username

      - action: tap
        target: { id: passwordField }
        description: Focus password field

      - action: type
        value: "${MOVIES_DO_TEST_PASSWORD}"
        description: Enter password

      - action: screenshot
        name: fields_filled
        description: Fields filled

      - action: tap
        target: { id: signInButton }
        description: Tap Sign In

      - action: wait
        duration: 5
        description: Wait for home to load

      - action: screenshot
        name: home_after_signin
        description: Home screen after sign-in

  - name: Home Hero to Title Detail
    description: Tap the featured hero card on home to see title detail
    tags: [critical, navigation]
    steps:
      - action: terminate
        description: Reset app
      - action: launch
        description: Launch into Home (auth persisted)
      - action: wait
        duration: 3

      - action: screenshot
        name: home_hero
        description: Home with hero visible

      - action: tap
        target: { id: "heroCard-heroCard-heroCard" }
        description: Tap hero card (triplicated SwiftUI identifier)

      - action: wait
        duration: 3
        description: Wait for detail to load

      - action: screenshot
        name: title_detail
        description: Title detail from hero

      - action: scroll
        direction: down
        amount: 3
        description: Scroll to see episodes and cast

      - action: screenshot
        name: detail_scrolled
        description: Title detail scrolled (episodes, synopsis, cast)

      - action: tap
        target: { text: "Back" }
        description: Go back to home

  - name: Continue Watching
    description: Tap a continue watching item to see its title detail
    tags: [critical, continuity]
    steps:
      - action: terminate
      - action: launch
      - action: wait
        duration: 3

      - action: scroll
        direction: down
        amount: 2
        description: Scroll to continue watching section

      - action: screenshot
        name: continue_watching_visible
        description: Continue watching section

      - action: tap
        target: { text: "Shrinking" }
        description: Tap Shrinking continue-watching item (fuzzy text match)

      - action: wait
        duration: 3
        description: Wait for detail

      - action: screenshot
        name: cw_title_detail
        description: Title detail from continue watching

      - action: tap
        target: { text: "Back" }
        description: Go back

  - name: Browse Catalog
    description: Open browse tab and browse the catalog grid
    tags: [discovery]
    steps:
      - action: terminate
      - action: launch
      - action: wait
        duration: 3

      - action: tap
        target: { coordinates: [120, 818] }
        description: Tap Browse tab (coordinates — tab bar not in a11y tree)

      - action: wait
        duration: 3
        description: Wait for catalog to load

      - action: screenshot
        name: browse_grid
        description: Browse catalog grid

      - action: scroll
        direction: down
        amount: 3
        description: Scroll catalog

      - action: screenshot
        name: browse_scrolled
        description: Browse scrolled

      - action: tap
        target: { text: "Avatar" }
        description: Tap first Avatar result (stable title)

      - action: wait
        duration: 3
        description: Wait for detail

      - action: screenshot
        name: detail_from_browse
        description: Title detail from browse

      - action: tap
        target: { text: "Back" }
        description: Go back to browse

  - name: Search
    description: Search for a title and open it
    tags: [discovery]
    steps:
      - action: terminate
      - action: launch
      - action: wait
        duration: 3

      - action: tap
        target: { coordinates: [201, 818] }
        description: Tap Search tab

      - action: wait
        duration: 2
        description: Wait for search screen

      - action: screenshot
        name: search_empty
        description: Search screen (Trending)

      - action: tap
        target: { coordinates: [201, 200] }
        description: Focus search field (not in a11y tree — coords)

      - action: wait
        duration: 1

      - action: type
        value: "avatar"
        description: Type search query

      - action: wait
        duration: 3
        description: Wait for results

      - action: screenshot
        name: search_results
        description: Search results for "avatar"

      - action: tap
        target: { text: "Avatar" }
        description: Tap Avatar result

      - action: wait
        duration: 3
        description: Wait for detail

      - action: screenshot
        name: detail_from_search
        description: Title detail from search

      - action: tap
        target: { text: "Back" }
        description: Go back

  - name: Playback
    description: Start video playback from title detail
    tags: [critical, playback]
    steps:
      - action: terminate
      - action: launch
      - action: wait
        duration: 3

      - action: tap
        target: { id: "heroCard-heroCard-heroCard" }
        description: Tap hero

      - action: wait
        duration: 3
        description: Wait for detail

      - action: tap
        target: { id: playButton }
        description: Tap Play button

      - action: wait
        duration: 6
        description: Wait for video to load

      - action: screenshot
        name: player_active
        description: Player with video

      - action: tap
        target: { coordinates: [200, 440] }
        description: Tap to surface player controls (controls auto-hide)

      - action: wait
        duration: 1
        description: Let controls appear

      - action: tap
        target: { id: "Close Button" }
        description: Close the player

  - name: Episode Selection
    description: Browse episodes of a series and play a specific one
    tags: [critical, series]
    steps:
      - action: terminate
      - action: launch
      - action: wait
        duration: 3

      - action: scroll
        direction: down
        amount: 2
        description: Scroll to continue watching

      - action: tap
        target: { text: "Shrinking" }
        description: Tap Shrinking series (known multi-episode series)

      - action: wait
        duration: 3
        description: Wait for detail

      - action: scroll
        direction: down
        amount: 3
        description: Scroll to episodes list

      - action: screenshot
        name: episode_list
        description: Episode list

      - action: tap
        target: { text: "Episode 2" }
        description: Tap Episode 2 (fuzzy match Ep 02)

      - action: wait
        duration: 5
        description: Wait for player

      - action: screenshot
        name: episode_player
        description: Player from episode selection

      - action: tap
        target: { text: "Back" }
        description: Exit player

  - name: Cast to Celebrity
    description: Scroll Title Detail to the cast rail (cast cards are not in the idb a11y tree so automated tap is unreliable — this flow captures the scrolled state only)
    tags: [detail, known-gap]
    steps:
      - action: terminate
      - action: launch
      - action: wait
        duration: 3

      - action: tap
        target: { id: "heroCard-heroCard-heroCard" }
        description: Open hero title

      - action: wait
        duration: 3
        description: Wait for detail

      - action: scroll
        direction: down
        amount: 6
        description: Scroll toward cast section

      - action: screenshot
        name: cast_section
        description: Cast horizontal scroll visible

      - action: scroll
        direction: down
        amount: 4
        description: Scroll further to capture more cast

      - action: screenshot
        name: cast_further
        description: More cast scrolled into view

      - action: tap
        target: { text: "Back" }
        description: Return to home

  - name: Library
    description: View library with continue watching, favorites, and profile
    tags: [personal]
    steps:
      - action: terminate
      - action: launch
      - action: wait
        duration: 3

      - action: tap
        target: { coordinates: [362, 818] }
        description: Tap Library tab

      - action: wait
        duration: 3
        description: Wait for library to load

      - action: screenshot
        name: library_top
        description: Library with profile and continue watching

      - action: scroll
        direction: down
        amount: 5
        description: Scroll to favorites

      - action: screenshot
        name: library_favorites
        description: Library favorites and sign out

  - name: Favorite Toggle
    description: Toggle a title as favorite from its detail page
    tags: [personal]
    steps:
      - action: terminate
      - action: launch
      - action: wait
        duration: 3

      - action: tap
        target: { id: "heroCard-heroCard-heroCard" }
        description: Open a title

      - action: wait
        duration: 3
        description: Wait for detail

      - action: screenshot
        name: before_favorite
        description: Heart icon before toggle

      - action: tap
        target: { id: favoriteButton }
        description: Tap heart button

      - action: wait
        duration: 2
        description: Wait for toggle

      - action: screenshot
        name: after_favorite
        description: Heart icon after toggle
