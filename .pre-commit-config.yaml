repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      # Use system gitleaks (installed via Homebrew in Brewfile/Brewfile.core).
      - id: gitleaks-system
        pass_filenames: false

  - repo: local
    hooks:
      - id: nix-flake-check
        name: nix flake check
        entry: bash -c 'command -v nix >/dev/null 2>&1 || { echo "skip: nix not installed"; exit 0; }; nix --extra-experimental-features "nix-command flakes" flake check --no-build'
        language: system
        pass_filenames: false
        files: '^(flake\.nix|flake\.lock|nix/.*)$'
