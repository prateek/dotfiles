# Hook config is pre-commit compatible, but this repo runs it with `prek`.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      # Use system gitleaks (installed via Homebrew in Brewfile/Brewfile.core).
      - id: gitleaks-system
        pass_filenames: false

  - repo: local
    hooks:
      - id: chezmoi-dry-run
        name: chezmoi apply --dry-run
        entry: make test-chezmoi-apply
        language: system
        pass_filenames: false
        files: ^home/
      - id: docs-lifecycle
        name: docs lifecycle validation
        entry: env DOCS_LIFECYCLE_BASE=HEAD make test-docs-lifecycle
        language: system
        always_run: true
        pass_filenames: false
